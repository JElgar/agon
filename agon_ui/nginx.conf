server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA fallback: client-side routes like /invite/<token>, /matches/<id>, etc.
    # have no file on disk. Serve index.html so React Router can handle them on a
    # cold load — critical for invite links, which brand-new users open before
    # any service worker (with its own navigateFallback) is installed.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # The runtime-env file is rewritten at container start (envsubst) and must
    # never be cached, so a redeployed Supabase URL/key takes effect immediately.
    location ~* runtime-env.*\.js$ {
        add_header Cache-Control "no-store";
    }
}
