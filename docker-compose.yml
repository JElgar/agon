services:
  # Local Meilisearch for the discovery/search endpoints. Data (DynamoDB) lives
  # in AWS; only search is run locally. Master key matches .env.example.
  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: always
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: masterKeyForLocalDevOnly
    ports:
      - 7700:7700
    volumes:
      - meili_data:/meili_data

volumes:
  meili_data:
