on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings

  # NOTE: the previous localhost `test` job (make run + wait_till_up + make test)
  # was removed. It booted the service against a local Postgres (via
  # docker-compose + sqlx migrations) and ran the integration tests over HTTP.
  # The service now uses DynamoDB, which isn't available in this job, so the
  # service can't boot here. Integration tests instead run post-deploy against
  # the real staging backend (see release.yml -> test.yml).

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cargo build

    # TODO cargo run and then make tests work against localhost (without docker maybe? - or build docke rand use taht)

  # Non-blocking: compile the worker WITH the Temporal feature so SDK API drift
  # surfaces here. The Temporal Rust SDK is Public Preview (a churning git
  # dependency) and this code cannot be verified locally, so it is NOT part of
  # the default build/deploy. `continue-on-error` means a failure here reports
  # the compile errors to fix without blocking the release. Remove the flag once
  # the feature compiles cleanly and we want it enforced.
  check-temporal:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cargo check -p agon_worker --features temporal

